<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.name">Apolo</title>
    <link rel="stylesheet" href="./ui/styles/index.css" />
    <script type="module" src="./ui/scripts/index.ts"></script>
    <style>
      #loader {
        animation: animate-stroke 800ms linear infinite alternate;
      }

      @keyframes animate-stroke {
        0% {
          stroke: currentColor;
          stroke-width: 4;
          stroke-dashoffset: 25%;
          stroke-dasharray: 0 32%;
        }
        50% {
          stroke: currentColor;
          stroke-width: 4;
        }
        100% {
          stroke: transparent;
          stroke-width: 0;
          stroke-dashoffset: -25%;
          stroke-dasharray: 32% 0;
        }
      }
    </style>
  </head>
  <body>
    <app-shell></app-shell>

    <div
      id="loader-container"
      aria-label="Loading Apolo"
      class="bg-background fixed inset-0 flex items-center justify-center transition duration-400"
    >
      <svg id="loader" class="size-24" viewBox="0 0 24 24" fill="none">
        <path
          d="M9 19C9 20.1046 7.65685 21 6 21C4.34315 21 3 20.1046 3 19C3 17.8954 4.34315 17 6 17C7.65685 17 9 17.8954 9 19ZM9 19V5L21 3V17M21 17C21 18.1046 19.6569 19 18 19C16.3431 19 15 18.1046 15 17C15 15.8954 16.3431 15 18 15C19.6569 15 21 15.8954 21 17ZM9 9L21 7"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>
  </body>
</html>
